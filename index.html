<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Altair Quest — интерактивный AI‑репетитор</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="wrap">
      <h1>Altair Quest</h1>
      <p>Интерактивный AI‑репетитор для быстрого и живого изучения языков.</p>
      <a class="cta" href="#signup">Записаться</a>
    </div>
  </header>

  <section id="about" class="section">
    <div class="wrap">
      <h2>Что это</h2>
      <p>Короткие миссии, диалоги с AI, персональная траектория прогресса.</p>
    </div>
  </section>

  <section id="signup" class="section dark">
    <div class="wrap">
      <h2>Записаться на тест</h2>
      <p>Оставь email — получишь пробное задание.</p>
      <form action="#" class="form">
        <input type="email" placeholder="Email" required />
        <button type="submit">Получить</button>
      </form>
    </div>
  </section>

  <footer class="footer">
    <div class="wrap">© Altair Quest</div>
  </footer>
</body>
</html>
